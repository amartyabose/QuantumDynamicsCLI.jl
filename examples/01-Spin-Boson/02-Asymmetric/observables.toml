[[simulation]]
name = "asymmetric-spin-boson"
method = "LSC"
output = "output.hdf5"

nsteps = 250
dt = 0.1

num_bins = 10
num_mc = 10000

rho0 = "P_1"
outgroup = "init_1"

observable_output = "LSC_out.dat"

[[simulation.observable]]
observable = "P_1"
[[simulation.observable]]
observable = "P_2"
[[simulation.observable]]
observable = "trace"
[[simulation.observable]]
observable = "purity"
[[simulation.observable]]
observable = "vonNeumann_entropy"

